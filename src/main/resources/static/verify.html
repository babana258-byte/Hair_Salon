<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沐序_手機驗證</title>
  <link href="./css/bootstrap.css" rel="stylesheet" />
  <link href="./css/verify.css" rel="stylesheet" />
  <link rel="icon" href="./img/logo_favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
</head>

<body>

  <!-- 驗證區（置中卡片） -->
  <div class="verify-right">

    <!-- Logo -->
    <div class="verify-logo">
      <a href="./index.html">
        <img src="./img/logo_navbar.png" alt="沐序 Logo">
      </a>
      <p>Mushue Hair Salon</p>
    </div>

    <!-- 驗證內容 -->
    <div id="verifyContent">

      <!-- 手機圖示 -->
      <div class="phone-icon">
        <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/>
        </svg>
      </div>

      <span class="section-label" style="display:block;text-align:center;">SMS Verification</span>
      <div class="verify-title">手機號碼驗證</div>
      <div class="verify-subtitle">
        驗證碼已發送至<br>
        <span id="phoneDisplay">09xx-xxx-xxx</span>
      </div>

      <!-- Alert -->
      <div class="alert-msg" id="alertMsg"></div>

      <!-- 表單 -->
      <form id="verifyForm">
        <!-- OTP 輸入框 -->
        <div class="otp-group">
          <input type="number" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
          <input type="number" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="number" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="number" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="number" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="number" class="otp-input" maxlength="1" inputmode="numeric">
        </div>

        <!-- 提交按鈕 -->
        <button type="submit" class="submit-btn" id="submitBtn" disabled>確認驗證</button>
      </form>

      <!-- 倒數計時 & 重送 -->
      <div class="resend-area">
        <div class="countdown" id="countdown">
          沒收到驗證碼？<span id="secondsLeft">60</span> 秒後可重新發送
        </div>
        <button class="resend-btn" id="resendBtn">重新發送驗證碼</button>
      </div>

      <!-- 返回 -->
      <div class="back-link">
        <a href="./login.html">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
          </svg>
          返回修改手機號碼
        </a>
      </div>

    </div>

    <!-- 驗證成功畫面 -->
    <div class="success-screen" id="successScreen">
      <div class="success-icon">
        <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h2>驗證成功！</h2>
      <p>您的手機號碼已完成驗證，註冊成功！</p>
      <p class="success-countdown"><span id="successSecondsLeft">30</span> 秒後自動前往首頁</p>
      <div class="success-actions">
        <a href="./profile.html" class="submit-btn" id="btnGoProfile" style="display:block;text-align:center;text-decoration:none;">前往個人中心</a>
        <a href="./index.html" class="success-home-link" id="btnGoHome">回到首頁</a>
      </div>
    </div>

  </div>

  <script src="./js/verify.js"></script>
</body>
</html>
