<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沐序_個人中心</title>
  <link href="./css/bootstrap.css" rel="stylesheet" />
  <link href="./css/profile.css" rel="stylesheet" />

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

<body>

    <div class="container-fluid">
      <a class="navbar-brand" href="./index.html">
        <img src="./img/logo_navbar.png" width="90px" height="auto">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav mb-5 mb-md-0 ms-auto">
          <li class="nav-item"><a class="nav-link" href="./index.html">首頁</a></li>
          <li class="nav-item"><a class="nav-link" href="./reserve.html">立即預約</a></li>
          <li class="nav-item"><a class="nav-link" href="./shop.html">商品</a></li>
          <li class="nav-item"><a class="nav-link" href="./Breaking_news.html">最新消息</a></li>
          <li class="nav-item"><a class="nav-link" href="./about_us.html">關於我們</a></li>
        </ul>
        <div id="navAuthWrap" class="ms-3 d-flex align-items-center nav-user-icons" style="display:flex!important;">
          <div class="nav-dropdown">
            <button class="nav-icon-btn" onclick="toggleCartDropdown(event)" title="購物車">

              <span class="cart-badge" id="cartBadge"></span>
            </button>
            <div class="nav-dropdown-menu cart-dropdown-menu" id="cartDropdownMenu">
              <div id="cartDropdownList"></div>
              <div class="cart-dropdown-footer">
                <a href="./cart.html" class="cart-checkout-link">前往購物車</a>
              </div>
            </div>
          </div>
          <div class="nav-dropdown">
            <button class="nav-icon-btn" onclick="toggleProfileDropdown(event)" title="個人中心">
              <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
            </button>
            <div class="nav-dropdown-menu" id="profileDropdownMenu">
              <a href="./profile.html" class="nav-dropdown-item">個人中心</a>
              <a href="#" class="nav-dropdown-item" onclick="navLogout(); return false;">登出</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container" style="padding-top: 80px; max-width: 1200px;">

    <!-- Page Header -->
    <div class="page-header">
      <span class="section-label">My Account</span>
      <h1>個人中心</h1>
      <p>歡迎回到您的專屬空間。</p>
    </div>

    <div class="row g-4">
      <!-- Sidebar -->
      <div class="col-md-3">
        <div class="sidebar-nav">
          <button class="nav-item-btn active" data-section="overview" onclick="switchSection('overview')">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            帳戶概覽
          </button>
          <button class="nav-item-btn" data-section="profile" onclick="switchSection('profile')">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/>
            </svg>
            個人資料
          </button>
          <button class="nav-item-btn" data-section="appointments" onclick="switchSection('appointments')">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/>
            </svg>
            預約記錄
          </button>
          <button class="nav-item-btn" data-section="invoices" onclick="switchSection('invoices')">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 14.25l6-6m4.5-3.493V21.75l-3.75-1.5-3.75 1.5-3.75-1.5-3.75 1.5V4.757c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185z"/>
            </svg>
            消費記錄
          </button>
          <button class="nav-item-btn" data-section="password" onclick="switchSection('password')">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">

            </svg>
            修改密碼
          </button>
          <hr style="border-color:var(--chalk-beige);margin:0.8rem 0;">
          <button class="nav-item-btn" onclick="logout()" style="color:var(--text-mid);">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
            </svg>
            登出
          </button>
        </div>
      </div>

      <!-- Content Area -->
      <div class="col-md-9">

        <!-- ── 帳戶概覽 ── -->
        <div class="content-section active" id="section-overview">
          <!-- Member Card -->
          <div class="member-card mb-4">
            <div class="member-info">
              <h2>王小明</h2>
              <p>會員 · 加入於 2024 年 1 月</p>
            </div>
          </div>

          <div class="row g-4">
            <!-- 即將到來的預約 -->
            <div class="col-md-6">
              <div class="info-card">
                <div class="card-header">
                  <span class="card-title">即將到來的預約</span>
                  <a href="#" class="card-link" onclick="switchSection('appointments')">查看全部</a>
                </div>
                <div class="appointment-item">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;">
                    <div class="service-name">縮毛矯正</div>
                    <span class="badge badge-confirmed">已確認</span>
                  </div>
                  <div class="meta">
                    <div class="meta-item">
                      <label>日期</label>
                      <span>2025-05-10</span>
                    </div>
                    <div class="meta-item">
                      <label>時間</label>
                      <span>14:00</span>
                    </div>
                  </div>
                  <p class="hint">請於預約時間前 5 分鐘到達，謝謝。</p>
                </div>
              </div>
            </div>

            <!-- 最近消費 -->
            <div class="col-md-6">
              <div class="info-card">
                <div class="card-header">
                  <span class="card-title">最近消費</span>
                  <a href="#" class="card-link" onclick="switchSection('invoices')">查看全部</a>
                </div>
                <div class="invoice-item">
                  <div class="invoice-icon">
                    <svg width="20" height="20" fill="none" stroke="var(--brandy-rose)" stroke-width="1.5" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9 14.25l6-6m4.5-3.493V21.75l-3.75-1.5-3.75 1.5-3.75-1.5-3.75 1.5V4.757c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185z"/>
                    </svg>
                  </div>
                  <div class="invoice-info">
                    <div class="service">線條染 + 護髮</div>
                    <div class="date">2025-04-20 · 刷卡</div>
                  </div>
                  <div class="invoice-amount">NT$ 4,200</div>
                </div>
                <div class="invoice-item">
                  <div class="invoice-icon">
                    <svg width="20" height="20" fill="none" stroke="var(--brandy-rose)" stroke-width="1.5" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9 14.25l6-6m4.5-3.493V21.75l-3.75-1.5-3.75 1.5-3.75-1.5-3.75 1.5V4.757c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185z"/>
                    </svg>
                  </div>
                  <div class="invoice-info">
                    <div class="service">剪髮</div>
                    <div class="date">2025-03-15 · 現金</div>
                  </div>
                  <div class="invoice-amount">NT$ 500</div>
                </div>
              </div>
            </div>

            <!-- 快速操作 -->
            <div class="col-12">
              <div class="info-card">
                <div class="card-header">
                  <span class="card-title">快速操作</span>
                </div>
                <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                  <a href="./reserve.html" class="btn-primary" style="text-decoration:none;">立即預約</a>
                  <button class="btn-outline" onclick="switchSection('profile')">編輯資料</button>
                  <button class="btn-outline" onclick="switchSection('password')">修改密碼</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── 個人資料 ── -->
        <div class="content-section" id="section-profile">
          <div class="info-card">
            <div class="card-header">
              <span class="card-title">個人資料</span>
            </div>
            <div id="profileAlert" class="alert-msg"></div>
            <form id="profileFormEl" class="profile-form">
              <div class="row g-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="profileName" value="王小明" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>手機號碼</label>
                    <input type="tel" id="profilePhone" value="0912-345-678" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>生日</label>
                    <input type="date" id="profileBirthday" value="1995-06-15">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>性別</label>
                    <select id="profileGender">
                      <option value="男">男</option>
                      <option value="女">女</option>
                      <option value="其他">其他</option>
                    </select>
                  </div>
                </div>
              </div>
              <div style="margin-top:1.5rem;">
                <button type="submit" class="btn-primary">儲存變更</button>
              </div>
            </form>
          </div>
        </div>

        <!-- ── 預約記錄 ── -->
        <div class="content-section" id="section-appointments">
          <div class="info-card">
            <div class="card-header">
              <span class="card-title">預約記錄</span>
              <a href="./reserve.html" class="card-link">+ 新增預約</a>
            </div>
            <div id="appointmentList" style="display:flex;flex-direction:column;gap:0.8rem;">
              <!-- 由 JS 載入 -->
            </div>
          </div>
        </div>

        <!-- ── 消費記錄 ── -->
        <div class="content-section" id="section-invoices">
          <div class="info-card">
            <div class="card-header">
              <span class="card-title">消費記錄</span>
            </div>
            <div id="invoiceList">
              <!-- 由 JS 載入 -->
            </div>
          </div>
        </div>

        <!-- ── 修改密碼 ── -->
        <div class="content-section" id="section-password">
          <div class="info-card">
            <div class="card-header">
              <span class="card-title">修改密碼</span>
            </div>
            <div id="passwordAlert" class="alert-msg"></div>
            <form id="passwordFormEl" class="profile-form">
              <div class="form-group">
                <label>目前密碼</label>
                <input type="password" id="oldPassword" placeholder="輸入目前的密碼" required>
              </div>
              <div class="form-group">
                <label>新密碼</label>
                <input type="password" id="newPassword" placeholder="設定新密碼（至少8位）" required>
              </div>
              <div class="form-group">
                <label>確認新密碼</label>
                <input type="password" id="confirmPassword" placeholder="再次輸入新密碼" required>
              </div>
              <div style="margin-top:1.5rem;">
                <button type="submit" class="btn-primary">確認修改</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>

    <footer class="container">

      <div style="font-size:0.75rem;color:var(--neutral);letter-spacing:0.1em;">© 2024 沐序 Hair Salon</div>

        <svg width="18" height="auto" fill="currentColor" viewBox="0 0 16 16">
