        <button class="category-btn" onclick="switchCategory('造型品', this)">造型系列</button>
        <button class="category-btn" onclick="switchCategory('染劑', this)">染劑</button>
        <button class="category-btn" onclick="switchCategory('販售商品', this)">其他商品</button>

  <!-- Product Detail Modal -->
  <div id="productModal" class="product-modal-overlay" onclick="closeProductModal(event)">
    <div class="product-modal-box">
      <button class="product-modal-close" onclick="closeProductModalBtn()" title="關閉">×</button>
      <div class="product-modal-img" id="modalImgArea">
        <div class="modal-img-placeholder" id="modalImgPlaceholder"></div>
        <img id="modalImg" src="" alt="" style="display:none;">
      </div>
      <div class="product-modal-info">
        <div class="product-modal-brand" id="modalBrand"></div>
        <h2 class="product-modal-name" id="modalName"></h2>
        <div class="product-modal-price" id="modalPrice"></div>
        <p class="product-modal-desc" id="modalDesc"></p>
        <div class="product-modal-qty">
          <span class="qty-label">數量</span>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-num" id="modalQty">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>
        <button class="product-modal-add-btn" onclick="modalAddToCart()">加入購物車</button>
      </div>
    </div>
  </div>

  <!-- Cart Toast -->
  <div class="cart-toast" id="cartToast"></div>

  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/nav-auth.js"></script>
  <script src="./js/shop.js"></script>
