  <div id="id01" class="modal">
    <span onclick="document.getElementById('id01').style.display='none'" class="close"
      title="Close Modal">&times;</span>
    <form class="modal-content animate" action="">
      <div class="containerlogin">
        <p
          style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--brown-dark);margin-bottom:1.2rem;">
          會員登入</p>
        <label>帳號</label>
        <input type="text" placeholder="輸入您的帳號..." name="uname" required>
        <label>密碼</label>
        <input type="password" placeholder="輸入您的密碼..." name="psw" required>
        <label style="font-size:0.75rem;color:var(--text-mid);cursor:pointer;">
          <input type="checkbox" checked name="remember" style="width:auto;margin-right:0.4rem;"> 記住我
        </label>
        <button type="submit">登 入</button>
      </div>
      <div class="containerlogin"
        style="background-color:var(--chalk-beige);display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;">
        <button type="button" onclick="document.getElementById('id01').style.display='none'"
          class="cancelbtn">取消</button>
        <span class="psw"><a href="#">忘記密碼？</a></span>
      </div>
    </form>
  </div>

  <div class="bg-reserve">
    <div class="page-header">
      <div class="section-label">Reservation</div>
      <h2>立即預約</h2>
      <p>請選擇您方便的日期與時間，我們將盡快為您安排</p>
    </div>

    <div class="reserve-layout">
      <!-- Calendar -->
      <div class="calendar-wrapper">
        <div class="cal-header">
          <button class="cal-btn" id="prevMonth" type="button">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path fill-rule="evenodd"
                d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
            </svg>
          </button>
          <span class="cal-month-name" id="currentMonthName"></span>
          <button class="cal-btn" id="nextMonth" type="button">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path fill-rule="evenodd"
                d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8" />
            </svg>
          </button>
        </div>
        <div class="cal-weekdays">
          <div class="cal-weekday">日</div>
          <div class="cal-weekday">一</div>
          <div class="cal-weekday">二</div>
          <div class="cal-weekday">三</div>
          <div class="cal-weekday">四</div>
          <div class="cal-weekday">五</div>
          <div class="cal-weekday">六</div>
        </div>
        <div class="cal-days" id="calDays"></div>
        <div class="selected-date-display" id="selectedDateDisplay">請選擇預約日期</div>
      </div>

      <!-- Form -->
      <div class="form-wrapper">
        <div class="form-title">填寫預約資料</div>
        <form id="reserveForm">
          <div class="form-group">
            <label>姓名</label>
            <input type="text" id="name" name="name" placeholder="您的姓名" required>
          </div>
          <div class="form-group">
            <label>手機號碼</label>
            <input type="tel" id="phone" name="phone" placeholder="輸入您的手機號碼" required>
          </div>
          <div class="form-group">
            <label>服務內容</label>
            <select id="service" name="service">
              <option value="Haircut">剪髮</option>
              <option value="Perming">燙髮</option>
              <option value="HairDye">染髮</option>
              <option value="HairCare">護髮</option>
              <option value="ScalpCare">頭皮養護</option>
              <option value="HairStyling">妝髮造型</option>
            </select>
          </div>
          <div class="form-group">
            <label>預約時間</label>
            <select id="time" name="time">
              <option value="10:00">10:00</option>
              <option value="10:30">10:30</option>
              <option value="11:00">11:00</option>
              <option value="11:30">11:30</option>
              <option value="12:00">12:00</option>
              <option value="12:30">12:30</option>
              <option value="13:00">13:00</option>
              <option value="13:30">13:30</option>
              <option value="14:00">14:00</option>
              <option value="14:30">14:30</option>
              <option value="15:00">15:00</option>
              <option value="15:30">15:30</option>
              <option value="16:00">16:00</option>
              <option value="16:30">16:30</option>
              <option value="17:00">17:00</option>
              <option value="17:30">17:30</option>
              <option value="18:00">18:00</option>
              <option value="18:30">18:30</option>
              <option value="19:00">19:00</option>
            </select>
          </div>
          <div class="form-group">
            <label>備註</label>
            <textarea id="Remark" name="Remark" placeholder="有其他需要為您留意的部分請告知我們～"></textarea>
          </div>
          <button type="submit" class="submit-btn">確認預約</button>
          <div class="success-msg" id="successMsg">✓ 預約成功！我們將盡快與您確認預約時間。</div>
        </form>
      </div>
    </div>
