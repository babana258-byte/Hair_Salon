      background-size: cover;
      background-repeat: no-repeat;
      background-position: top center;
      /* 透明度效果 */
      z-index: 0;
    }

    .bg-reserve::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.89);
      pointer-events: none;
      z-index: 1;
    }

    .bg-reserve>* {
      position: relative;
      z-index: 2;
    }

        <div class="d-grid gap-1">
          <div class="cal">

                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="July">July</option>
                <option value="August">August</option>
                <option value="September">September</option>
                <option value="October">October</option>
                <option value="November">November</option>
                <option value="December">December</option>
              </select>
              <button class="btn cal-btn" id="nextMonth" type="button" aria-label="next month">
                <svg width="16" height="16" fill="currentColor" class="bi bi-arrow-right-short" viewBox="0 0 16 16">

                </svg>
              </button>
            </div>
            <div class="cal-weekdays text-body-secondary">
              <div class="cal-weekday">一</div>
              <div class="cal-weekday">二</div>
              <div class="cal-weekday">三</div>
              <div class="cal-weekday">四</div>
              <div class="cal-weekday">五</div>
              <div class="cal-weekday">六</div>
              <div class="cal-weekday">日</div>
            </div>
            <div class="cal-days">

            </div>
          </div>
        </div>
      </div>
      <div class="container1 col-md-6 w-400px shadow">
        <form action="" class="fixed-reserve-form">

          <label for="name">姓名</label>
          <input type="text" id="name" name="name" placeholder="您的姓名...">

          <label for="phone">手機號碼</label>
          <input type="text" id="phone" name="phone" placeholder="輸入您的手機號碼...">


          <label for="service">服務內容</label>
          <select id="service" name="service">
            <option value="Haircut">剪髮</option>
            <option value="Perming">燙髮</option>
            <option value="HairDye">染髮</option>
            <option value="HairCare">護髮</option>
            <option value="ScalpCare">頭皮養護</option>
            <option value="HairStyling">妝髮造型</option>
          </select>

          <label for="time">選擇時間</label>
          <select id="time" name="time">
            <option value="10:00">10:00</option>
            <option value="10:30">10:30</option>
            <option value="11:00">11:00</option>
            <option value="11:30">11:30</option>
            <option value="12:00">12:00</option>

            <option value="17:00">17:00</option>
            <option value="17:30">17:30</option>
            <option value="18:00">18:00</option>
            <option value="18:30">18:30</option>
            <option value="19:00">19:00</option>
          </select>

          <label for="Remark">備註</label>
          <textarea id="Remark" name="Remark" placeholder="有其他需要為您留意的部分請告知我們~" style="height:100px"></textarea>

          <input onclick="s()" type="submit" value="提交">

        </form>

      </div>
