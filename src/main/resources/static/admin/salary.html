    <a href="./products.html" class="nav-item">

    <a href="./inventory.html" class="nav-item">

      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">薪資計算</div>
    </div>
    <div class="topbar-right">
      <span class="role-badge">管理員</span>
      <span class="admin-name">王老闆</span>
      <div class="admin-avatar">王</div>
    </div>
  </div>

  <div class="content">
    <!-- 頁首 -->
    <div class="page-header">
      <div class="page-header-left">
        <span class="section-label">Salary</span>
        <h1>薪資計算</h1>
      </div>
      <div style="display:flex;align-items:center;gap:0.8rem;">
        <div class="custom-select-wrapper" id="monthPickerWrapper" style="min-width:165px;">
          <button type="button" class="custom-select-btn" id="monthPickerBtn" style="background:var(--peach-cream);border-radius:50px;">
            <span id="monthPickerLabel">載入中…</span>
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="custom-select-list modal-select-scroll" id="monthPickerList"></div>
        </div>
        <button class="btn-outline" id="printBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0l.229 2.523a1.125 1.125 0 01-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0021 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 00-1.913-.247M6.34 18H5.25A2.25 2.25 0 013 15.75V9.456c0-1.081.768-2.015 1.837-2.175a48.041 48.041 0 011.913-.247m10.5 0a48.536 48.536 0 00-10.5 0m10.5 0V3.375c0-.621-.504-1.125-1.125-1.125h-8.25c-.621 0-1.125.504-1.125 1.125v3.659M18 10.5h.008v.008H18V10.5zm-3 0h.008v.008H15V10.5z"/></svg>
          列印薪資單
        </button>
      </div>
    </div>

    <!-- 月薪總覽 -->
    <div id="overviewSection">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <div style="font-size:0.68rem;letter-spacing:0.2em;color:var(--brandy-rose);text-transform:uppercase;" id="monthTitle"></div>
        <div style="font-size:0.8rem;color:var(--neutral);">
          本月總發薪：<span id="totalSalary" style="color:var(--brown-deep);font-family:'Cormorant Garamond',serif;font-size:1.1rem;"></span>
          ／<span id="totalStaff"></span>
        </div>
      </div>
      <div class="row g-3 mb-4" id="overviewCards"></div>
    </div>

    <!-- 薪資明細 -->
    <div id="detailPanel" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <div style="font-size:0.68rem;letter-spacing:0.2em;color:var(--brandy-rose);text-transform:uppercase;" id="detailName"></div>
      </div>

      <!-- 服務明細 -->
      <div class="detail-section">
        <div class="detail-section-title">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
          服務業績明細
        </div>
        <table class="detail-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>客戶</th>
              <th>服務項目</th>
              <th style="text-align:right;">金額</th>
            </tr>
          </thead>
          <tbody id="svcTableBody"></tbody>
        </table>
        <div class="subtotal-row">
          <span class="label">服務業績總計</span>
          <span class="value" id="svcTotal"></span>
        </div>
        <div class="subtotal-row">
          <span class="label">服務抽成 <span id="svcRate" style="color:var(--brandy-rose);font-size:0.75rem;"></span></span>
          <span class="comm-value" id="svcComm"></span>
        </div>
      </div>

      <!-- 商品明細 -->
      <div class="detail-section">
        <div class="detail-section-title">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218"/></svg>
          商品銷售明細
        </div>
        <table class="detail-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>客戶</th>
              <th>商品名稱</th>
              <th>售價類型</th>
              <th style="text-align:right;">金額</th>
            </tr>
          </thead>
          <tbody id="prdTableBody"></tbody>
        </table>
        <div class="subtotal-row">
          <span class="label" id="prdNormLabel">原價銷售總計</span>
          <span class="value" id="prdNormTotal"></span>
        </div>
        <div class="subtotal-row">
          <span class="label" id="prdPromoLabel">活動價銷售總計</span>
          <span class="value" id="prdPromoTotal"></span>
        </div>
        <div class="subtotal-row">
          <span class="label">商品抽成合計</span>
          <span class="comm-value" id="prdComm"></span>
        </div>
      </div>

      <!-- 薪資匯總 -->
      <div class="salary-summary">
        <div class="summary-title">本月薪資匯總</div>
        <div class="summary-item">
          <span class="label" id="sumSvcLabel">服務抽成</span>
          <span class="value" id="sumSvcComm"></span>
        </div>
        <div class="summary-item">
          <span class="label" id="sumPrdLabel">商品抽成</span>
          <span class="value" id="sumPrdComm"></span>
        </div>
        <div class="summary-total">
          <span class="label">本月應領薪資</span>
          <span class="value" id="sumTotal"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 抽成設定 Modal -->
<div class="modal-overlay" id="commissionModalOverlay" onclick="if(event.target===this)closeCommissionModal()">
  <div class="modal" style="max-width:380px;">
    <div class="modal-title" id="commissionModalTitle">抽成比例設定</div>
    <form id="commissionForm">
      <div class="row g-3">
        <div class="col-12">
          <div class="form-group">
            <label>服務抽成 (%)</label>
            <input type="number" id="cService" min="0" max="100" step="1" placeholder="50" required>
          </div>
        </div>
        <div class="col-12">
          <div class="form-group">
            <label>商品原價抽成 (%)</label>
            <input type="number" id="cProductNormal" min="0" max="100" step="1" placeholder="20" required>
          </div>
        </div>
        <div class="col-12">
          <div class="form-group">
            <label>商品活動價抽成 (%)</label>
            <input type="number" id="cProductPromo" min="0" max="100" step="1" placeholder="10" required>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-outline" onclick="closeCommissionModal()">取消</button>
        <button type="submit" class="btn-primary">儲存</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="../js/admin/salary.js"></script>
</body>
</html>
