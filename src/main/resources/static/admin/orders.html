<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">訂單管理</div>
    </div>
    <div class="topbar-right">
      <span class="role-badge">管理員</span>
      <span class="admin-name">洪老闆</span>
      <div class="admin-avatar">洪</div>
    </div>
  </div>

  <div class="content">
    <div class="page-header">
      <div class="page-header-left">
        <span class="section-label">Orders</span>
        <h1>訂單管理</h1>
      </div>
    </div>

    <!-- 統計卡片 -->
    <div class="stats-grid">
      <div class="stat-card warning">
        <div class="stat-label">待確認</div>
        <div class="stat-value" id="statNew">—</div>
        <div class="stat-hint">需要處理</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">備貨中</div>
        <div class="stat-value" id="statPacking">—</div>
        <div class="stat-hint">準備出貨</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已出貨</div>
        <div class="stat-value" id="statShipped">—</div>
        <div class="stat-hint">配送中</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-label">未收款</div>
        <div class="stat-value" id="statUnpaid">—</div>
        <div class="stat-hint">待確認收款</div>
      </div>
    </div>

    <!-- 搜尋 & 篩選 -->
    <div class="card mb-3">
      <div class="card-body">
        <div class="toolbar">
          <div class="search-box">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
            <input type="text" id="searchInput" placeholder="搜尋訂單編號、客戶姓名...">
          </div>
          <div class="custom-select-wrapper" id="orderPaidDropdown">
            <button type="button" class="custom-select-btn" onclick="toggleOrderPaidDropdown()">
              <span id="orderPaidLabel">全部付款</span>
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </button>
            <ul class="custom-select-list" id="orderPaidList">
              <li class="custom-select-option selected" data-value="">全部付款</li>
              <li class="custom-select-option" data-value="paid">已付款</li>
              <li class="custom-select-option" data-value="unpaid">未付款</li>
            </ul>
          </div>
          <select id="paidFilter" style="display:none;"></select>
        </div>
      </div>
    </div>

    <!-- 次導覽列 -->
    <div class="status-tabs">
      <button class="status-tab active" data-status="">全部</button>
      <button class="status-tab" data-status="待確認">待確認</button>
      <button class="status-tab" data-status="備貨中">備貨中</button>
      <button class="status-tab" data-status="已出貨">已出貨</button>
      <button class="status-tab" data-status="已送達">已送達</button>
      <button class="status-tab" data-status="已完成">已完成</button>
      <button class="status-tab" data-status="已取消">已取消</button>
    </div>

    <!-- 資料表格 -->
    <div class="card">
      <div style="overflow-x:auto;">
        <table class="data-table orders-table">
          <thead>
            <tr>
              <th>訂單編號</th>
              <th>客戶</th>
              <th>商品</th>
              <th>金額</th>
              <th>付款方式</th>
              <th>付款狀態</th>
              <th>訂單狀態</th>
              <th style="text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody id="orderTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 訂單明細 Modal -->
<div class="modal-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal" style="max-width:560px;">
    <div class="modal-title">訂單明細</div>
    <div class="row g-3">
      <!-- 左欄：訂單資訊 -->
      <div class="col-12">
        <div style="background:var(--peach-cream);border-radius:12px;padding:1rem;font-size:0.82rem;display:flex;flex-direction:column;gap:0.4rem;">
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--neutral);">訂單編號</span>
            <span id="dOrderNo" style="color:var(--brandy-rose);letter-spacing:0.08em;"></span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--neutral);">下單時間</span>
            <span id="dCreatedAt"></span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--neutral);">訂單狀態</span>
            <span id="dStatus"></span>
          </div>
        </div>
      </div>
      <!-- 收件資訊 -->
      <div class="col-12">
        <div style="font-size:0.68rem;letter-spacing:0.15em;color:var(--brandy-rose);text-transform:uppercase;margin-bottom:0.5rem;">收件資訊</div>
        <div style="display:flex;flex-direction:column;gap:0.4rem;font-size:0.82rem;">
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--neutral);">收件人</span>
            <span id="dCustomer"></span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--neutral);">手機</span>
            <span id="dPhone"></span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;">
            <span style="color:var(--neutral);flex-shrink:0;">地址</span>
            <span id="dAddress" style="text-align:right;"></span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--neutral);">備註</span>
            <span id="dNotes"></span>
          </div>
        </div>
      </div>
      <!-- 商品清單 -->
      <div class="col-12">
        <div style="font-size:0.68rem;letter-spacing:0.15em;color:var(--brandy-rose);text-transform:uppercase;margin-bottom:0.5rem;">商品清單</div>
        <div id="dItems"></div>
        <div style="display:flex;justify-content:space-between;padding-top:0.8rem;margin-top:0.3rem;">
          <span style="font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--brown-deep);">總計</span>
          <span id="dTotal" style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--brown-deep);font-weight:500;"></span>
        </div>
      </div>
      <!-- 付款 -->
      <div class="col-12">
        <div style="display:flex;justify-content:space-between;font-size:0.82rem;">
          <span style="color:var(--neutral);">付款方式</span>
          <span id="dPayment"></span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-top:0.4rem;">
          <span style="color:var(--neutral);">付款狀態</span>
          <span id="dPaid"></span>
        </div>
      </div>
      <!-- 配送進度 -->
      <div class="col-12">
        <div style="font-size:0.68rem;letter-spacing:0.15em;color:var(--brandy-rose);text-transform:uppercase;margin-bottom:0.5rem;">配送進度</div>
        <div id="dProgress"></div>
      </div>
    </div>
    <div class="modal-footer">
      <div id="dActionBtns"></div>
      <button type="button" class="btn-outline" onclick="closeDetail()">關閉</button>
    </div>
  </div>
</div>

<!-- 更新狀態確認 Modal -->
<div class="modal-overlay" id="statusConfirmOverlay" onclick="if(event.target===this)closeStatusConfirm()">
  <div class="modal confirm-modal">
    <div class="confirm-icon">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 010 1.954l-7.108 4.061A1.125 1.125 0 013 16.811V8.69zM12.75 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 010 1.954l-7.108 4.061a1.125 1.125 0 01-1.683-.977V8.69z"/></svg>
    </div>
    <div class="confirm-title" id="statusConfirmTitle">確定更新訂單狀態？</div>
    <div class="confirm-desc" id="statusConfirmDesc"></div>
    <div class="modal-footer">
      <button type="button" class="btn-outline" onclick="closeStatusConfirm()">取消</button>
      <button type="button" class="btn-primary" onclick="confirmNextStatus()">確定</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="../js/admin/orders.js"></script>
</body>
</html>
