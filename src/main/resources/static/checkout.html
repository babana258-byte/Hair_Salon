<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-md fixed-top mark">
    <div class="container-fluid">
      <a class="navbar-brand" href="./index.html">
        <img src="./img/logo_navbar.png" width="90px" height="auto">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav mb-5 mb-md-0 ms-auto">
          <li class="nav-item"><a class="nav-link" href="./index.html">首頁</a></li>
          <li class="nav-item"><a class="nav-link" href="./reserve.html">立即預約</a></li>
          <li class="nav-item"><a class="nav-link" href="./shop.html">商品</a></li>
          <li class="nav-item"><a class="nav-link" href="./Breaking_news.html">最新消息</a></li>
          <li class="nav-item"><a class="nav-link" href="./about_us.html">關於我們</a></li>
        </ul>

          <div id="navUserIcons" class="nav-user-icons">

              <button class="nav-icon-btn" onclick="toggleCartDropdown(event)" title="購物車">

                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>

  <!-- Main -->
  <div style="padding-top: 80px;">
    <div class="container" style="max-width:1100px;">

      <!-- Page Header -->
      <div class="page-header">
        <span class="section-label">Checkout</span>
        <h1>結帳</h1>
        <p>請填寫收件資訊與付款方式，完成您的訂單</p>
      </div>

      <!-- Steps -->
      <div class="steps mb-4">
        <div class="step done">
          <div class="step-num">✓</div>
          <span>購物車</span>
        </div>
        <div class="step-line"></div>
        <div class="step active">
          <div class="step-num">2</div>
          <span>結帳資訊</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-num">3</div>
          <span>訂單確認</span>
        </div>
      </div>

      <form id="checkoutForm">
        <!-- 錯誤提示 -->
        <div id="checkoutError" style="display:none;background:#fde8e4;border:1px solid #c0705a;border-radius:12px;padding:0.8rem 1.2rem;margin-bottom:1rem;font-size:0.85rem;color:#8b3a2a;letter-spacing:0.05em;"></div>
        <div class="row g-4">

          <!-- 左側：填寫資訊 -->
          <div class="col-lg-7">

            <!-- 收件人資訊 -->
            <div class="form-card">
              <div class="form-card-title">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                </svg>
                收件人資訊
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="name" placeholder="收件人姓名">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>手機號碼</label>
                    <input type="tel" id="phone" placeholder="09xx-xxx-xxx">
                  </div>
                </div>
              </div>
            </div>

            <!-- 收件地址 -->
            <div class="form-card">
              <div class="form-card-title">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
                </svg>
                收件地址
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label>縣市</label>
                    <select id="city">
                      <option value="">選擇縣市</option>
                      <option>台北市</option>
                      <option>新北市</option>
                      <option>桃園市</option>
                      <option>台中市</option>
                      <option>台南市</option>
                      <option>高雄市</option>
                      <option>基隆市</option>
                      <option>新竹市</option>
                      <option>嘉義市</option>
                      <option>新竹縣</option>
                      <option>苗栗縣</option>
                      <option>彰化縣</option>
                      <option>南投縣</option>
                      <option>雲林縣</option>
                      <option>嘉義縣</option>
                      <option>屏東縣</option>
                      <option>宜蘭縣</option>
                      <option>花蓮縣</option>
                      <option>台東縣</option>
                      <option>澎湖縣</option>
                      <option>金門縣</option>
                      <option>連江縣</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>鄉鎮市區</label>
                    <input type="text" id="district" placeholder="鄉鎮市區">
                  </div>
                </div>
                <div class="col-12">
                  <div class="form-group">
                    <label>詳細地址</label>
                    <input type="text" id="address" placeholder="路／街、號、樓層">
                  </div>
                </div>
              </div>
            </div>

            <!-- 付款方式 -->
            <div class="form-card">
              <div class="form-card-title">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
                </svg>
                付款方式
              </div>
              <div class="payment-options">
                <div class="payment-option selected">
                  <input type="radio" name="payment" id="payment-cash" value="現金" checked>
                  <label for="payment-cash">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/>
                    </svg>
                    貨到付款（現金）
                  </label>
                </div>
                <div class="payment-option">
                  <input type="radio" name="payment" id="payment-transfer" value="轉帳">
                  <label for="payment-transfer">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/>
                    </svg>
                    ATM 轉帳
                  </label>
                </div>
              </div>
              <!-- 隱藏的 select 用於表單驗證 -->
              <input type="hidden" id="payment" name="payment" value="現金">
            </div>

            <!-- 備註 -->
            <div class="form-card">
              <div class="form-card-title">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 01.865-.501 48.172 48.172 0 003.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/>
                </svg>
                訂單備註（選填）
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <textarea id="notes" placeholder="有任何特殊需求或備註請告訴我們..."></textarea>
              </div>
            </div>

          </div>

          <!-- 右側：訂單摘要 -->
          <div class="col-lg-5">
            <div class="order-summary">
              <div class="summary-title">訂單摘要</div>

              <!-- 商品列表 -->
              <div id="orderItems"></div>

              <hr class="summary-divider">

              <div class="summary-row">
                <span class="label">小計</span>
                <span class="value" id="summarySubtotal">NT$ 0</span>
              </div>
              <div class="summary-row">
                <span class="label">運費</span>
                <span class="value" id="summaryShipping">NT$ 80</span>
              </div>

              <hr class="summary-divider">

              <div class="summary-total">
                <span class="label">總計</span>
                <span class="value" id="summaryTotal">NT$ 0</span>
              </div>

              <button type="button" class="submit-btn" id="submitBtn" onclick="submitOrder()">確認訂單</button>

              <div class="secure-info">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                </svg>
                安全加密付款保障
              </div>
            </div>
          </div>

        </div>
      </form>

      <!-- Footer -->
      <footer class="container">
        <div>
          <a href="https://line.me/ti/p/peBk-c-SYT" target="_blank" style="margin-right:12px;text-decoration:none;">

            </svg>
          </a>
          <a href="https://www.instagram.com/mushue_hair_salon?igsh=dWptYjczaXpsY29m&utm_source=qr" target="_blank" style="text-decoration:none;">
            <svg width="22" height="auto" fill="currentColor" class="social_media" style="color:var(--brandy-rose)" viewBox="0 0 16 16">

          </a>
        </div>
        <div style="font-size:0.75rem;color:var(--neutral);letter-spacing:0.1em;">© 2024 沐序 Hair Salon</div>
        <a href="#" class="btn-neutral-brown">
          <svg width="18" height="auto" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M8 10a.5.5 0 0 0 .5-.5V3.707l2.146 2.147a.5.5 0 0 0 .708-.708l-3-3a.5.5 0 0 0-.708 0l-3 3a.5.5 0 1 0 .708.708L7.5 3.707V9.5a.5.5 0 0 0 .5.5m-7 2.5a.5.5 0 0 1 .5-.5h13a.5.5 0 0 1 0 1h-13a.5.5 0 0 1-.5-.5"/>
          </svg>

      </footer>

  <!-- 訂單成功 Modal -->
  <div class="success-modal" id="successModal">
    <div class="success-modal-content">
      <div class="success-icon">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h2>訂單成立！</h2>
      <p>感謝您的購買，我們將盡快為您安排出貨。</p>
      <p>訂單確認通知將發送至您的手機。</p>
      <div class="order-number" id="orderNumber"></div>
      <div class="success-btns">
        <a href="./profile.html" class="btn-primary-sm">查看訂單</a>
        <a href="./shop.html" class="btn-outline-sm">繼續購物</a>
      </div>
    </div>
  </div>

  <script src="./js/bootstrap.bundle.min.js"></script>

</body>
